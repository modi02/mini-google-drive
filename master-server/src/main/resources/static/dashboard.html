<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Google Drive — Live Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    header .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; color: #64748b; }
    .pulse {
      margin-left: auto;
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: #64748b;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    .summary-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .stat-card {
      flex: 1; min-width: 160px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 18px 22px;
    }
    .stat-card .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 32px; font-weight: 700; margin-top: 6px; }
    .stat-card .value.green { color: #22c55e; }
    .stat-card .value.blue  { color: #4f8ef7; }
    .stat-card .value.amber { color: #f59e0b; }

    h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #94a3b8; letter-spacing: .04em; text-transform: uppercase; }

    /* ── Node Cards ── */
    #node-grid {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .node-card {
      flex: 1; min-width: 220px;
      background: #1e2130;
      border-radius: 14px;
      padding: 20px 24px;
      border: 2px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .node-card.alive  { border-color: #22c55e33; box-shadow: 0 0 20px #22c55e18; }
    .node-card.dead   { border-color: #ef444433; box-shadow: 0 0 20px #ef444418; }

    .node-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .node-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      text-transform: uppercase;
    }
    .node-badge.alive { background: #14532d; color: #4ade80; }
    .node-badge.dead  { background: #450a0a; color: #f87171; }

    .node-name { font-weight: 600; font-size: 15px; }
    .node-url  { font-size: 12px; color: #475569; margin-top: 2px; font-family: monospace; }

    .node-metrics { display: flex; gap: 20px; margin-top: 10px; }
    .metric { font-size: 12px; color: #64748b; }
    .metric span { display: block; font-size: 20px; font-weight: 700; color: #e2e8f0; }

    .status-icon { font-size: 28px; margin-left: auto; }

    /* ── File Table ── */
    .table-wrap {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #161825;
      padding: 12px 18px;
      text-align: left;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid #2d3148;
    }
    tbody tr { border-bottom: 1px solid #1a1d2e; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #232740; }
    tbody td { padding: 13px 18px; font-size: 13px; }

    .file-name { font-family: monospace; color: #93c5fd; font-weight: 500; }
    .replica-pill {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 11px;
      margin-right: 5px;
      margin-bottom: 3px;
    }
    .replica-pill.dead {
      background: #450a0a;
      color: #f87171;
      text-decoration: line-through;
    }
    .size-badge { color: #94a3b8; font-size: 12px; }
    .time-badge { color: #64748b; font-size: 11px; font-family: monospace; }
    .empty-msg { text-align: center; padding: 40px; color: #475569; }

    /* Scroll */
    .table-wrap { max-height: 420px; overflow-y: auto; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">☁</div>
  <div>
    <h1>Mini Google Drive</h1>
    <p>Distributed File Storage — Live Monitor</p>
  </div>
  <div class="pulse">
    <div class="pulse-dot"></div>
    <span id="last-update">Connecting…</span>
  </div>
</header>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="stat-card">
    <div class="label">Healthy Nodes</div>
    <div class="value green" id="stat-alive">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Total Nodes</div>
    <div class="value blue" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Files Stored</div>
    <div class="value blue" id="stat-files">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Replication</div>
    <div class="value amber" id="stat-rep">—</div>
  </div>
</div>

<!-- Node cards -->
<h2>Storage Nodes</h2>
<div id="node-grid">Loading nodes…</div>

<!-- File table -->
<h2>File Registry</h2>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Filename</th>
        <th>Size</th>
        <th>Replicas</th>
        <th>Uploaded At</th>
      </tr>
    </thead>
    <tbody id="file-table-body">
      <tr><td colspan="4" class="empty-msg">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
  // Track alive nodes by ID for replica pill colouring
  let aliveNodes = new Set();

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString();
  }

  async function fetchNodes() {
    const res = await fetch('/nodes/status');
    if (!res.ok) throw new Error('nodes/status ' + res.status);
    return res.json();
  }

  async function fetchFiles() {
    const res = await fetch('/files/list');
    if (!res.ok) throw new Error('files/list ' + res.status);
    return res.json();
  }

  function renderNodes(nodes) {
    aliveNodes = new Set(nodes.filter(n => n.alive).map(n => n.nodeId));
    const alive = nodes.filter(n => n.alive).length;

    document.getElementById('stat-alive').textContent = alive;
    document.getElementById('stat-total').textContent = nodes.length;

    const grid = document.getElementById('node-grid');
    grid.innerHTML = nodes.map(n => `
      <div class="node-card ${n.alive ? 'alive' : 'dead'}">
        <div class="node-header">
          <div>
            <div class="node-name">${n.nodeId}</div>
            <div class="node-url">${n.url}</div>
          </div>
          <div class="status-icon" style="margin-left:auto">${n.alive ? '🟢' : '🔴'}</div>
        </div>
        <span class="node-badge ${n.alive ? 'alive' : 'dead'}">${n.alive ? 'UP' : 'DOWN'}</span>
        <div class="node-metrics">
          <div class="metric"><span>${n.fileCount}</span>Files</div>
        </div>
      </div>
    `).join('');
  }

  function renderFiles(files) {
    document.getElementById('stat-files').textContent = files.length;

    // compute replication health
    if (files.length === 0) {
      document.getElementById('stat-rep').textContent = 'N/A';
    } else {
      const fullyReplicated = files.filter(f =>
        f.replicaNodes.every(r => aliveNodes.has(r))
      ).length;
      document.getElementById('stat-rep').textContent =
        fullyReplicated + '/' + files.length + ' healthy';
    }

    const tbody = document.getElementById('file-table-body');
    if (files.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No files uploaded yet</td></tr>';
      return;
    }

    tbody.innerHTML = files.map(f => {
      const pills = f.replicaNodes.map(r =>
        `<span class="replica-pill ${aliveNodes.has(r) ? '' : 'dead'}">${r}</span>`
      ).join('');
      return `
        <tr>
          <td class="file-name">${f.filename}</td>
          <td class="size-badge">${formatBytes(f.size)}</td>
          <td>${pills}</td>
          <td class="time-badge">${formatTime(f.uploadedAt)}</td>
        </tr>`;
    }).join('');
  }

  async function refresh() {
    try {
      const [nodes, files] = await Promise.all([fetchNodes(), fetchFiles()]);
      renderNodes(nodes);
      renderFiles(files);
      document.getElementById('last-update').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('last-update').textContent = 'Error: ' + e.message;
    }
  }

  // Initial load + poll every 3 seconds
  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
