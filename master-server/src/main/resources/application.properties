server.port=8080

# File upload limits (unchanged)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Health check interval (unchanged)
health.check.interval.ms=10000

# Replication factor (unchanged)
replication.factor=2

# Storage nodes (unchanged — still needed by ConsistentHashService)
storage.nodes=${STORAGE_NODES:http://localhost:8091,http://localhost:8092}

# Server nodes (new — master round robins across these)
server.nodes=${SERVER_NODES:http://localhost:8081,http://localhost:8082}

# Leader election — this master's own URL and its peer's URL
master.self.url=${MASTER_SELF_URL:http://localhost:8080}
master.peer.url=${MASTER_PEER_URL:http://localhost:8090}

# How often this master checks if peer is alive (ms)
leader.check.interval.ms=5000