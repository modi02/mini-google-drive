# Port comes from environment variable set in docker-compose
# Default 8081 for local testing
server.port=${SERVER_PORT:8081}

# MySQL connection — uses Docker service name "mysql"
spring.datasource.url=jdbc:mysql://mysql:3306/minidrive?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload size limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# This node's own URL (used when registering with master)
# Set via docker-compose environment variable
node.self.url=${NODE_SELF_URL:http://localhost:8081}

# Storage node URLs for consistent hashing (same as before)
storage.nodes=http://storage-node-1:8091,http://storage-node-2:8092