events {
    worker_connections 1024;
}

http {
    upstream masters {
        server master-1:8080 max_fails=3 fail_timeout=5s;
        server master-2:8080 max_fails=3 fail_timeout=5s backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://masters;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}